<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>のばす音（長音）クイズ</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff9e6; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        .progress-text { font-size: 16px; color: #888; margin-bottom: 5px; }
        .question-text { font-size: 18px; color: #666; margin-bottom: 10px; }
        .hint-box { display: inline-block; background-color: #ffeb3b; color: #333; padding: 8px 20px; border-radius: 15px; font-weight: bold; font-size: 18px; margin-bottom: 25px; box-shadow: 0 4px 0 #fbc02d; }
        .word-display { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 40px; font-weight: bold; margin: 30px 0; }
        .blank-box { width: 70px; height: 70px; border: 3px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #ff5722; background-color: #fafafa; }
        .blank-box.filled { border: 3px solid #ff5722; background-color: #fbe9e7; }
        .choices-area { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .choice-btn { width: 65px; height: 65px; font-size: 24px; font-weight: bold; background-color: #ffffff; border: 3px solid #2196f3; color: #2196f3; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 0 #1976d2; -webkit-tap-highlight-color: transparent; }
        .choice-btn.selected { background-color: #2196f3; color: white; }
        .choice-btn:disabled { background-color: #e0e0e0; border-color: #bdbdbd; color: #9e9e9e; box-shadow: none; cursor: not-allowed; }
        .action-btns button { background-color: #4caf50; color: white; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 5px; -webkit-tap-highlight-color: transparent; }
        button.listen-btn { background-color: #008cba; }
        button.next-btn { background-color: #ff9f43; display: none; } /* 初期状態は非表示 */
        .back-btn { background-color: #888; font-size: 14px; padding: 8px 20px; border-radius: 15px; text-decoration: none; color: white; display: inline-block; margin-bottom: 20px; }
        #result-message { font-size: 32px; font-weight: bold; margin-top: 20px; height: 45px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← メニューにもどる</a>
    
    <div id="progress" class="progress-text">---</div>
    
    <h1>のばす音（長音）クイズ</h1>
    <p class="question-text">ただしい 文字を えらんで、音を きいてみよう！</p>
    
    <div class="hint-box">👄 くちの かたち：<span id="hint-vowel"></span></div>

    <div class="word-display">
        <span id="text-before"></span>
        <div id="blank-box" class="blank-box">？</div>
        <span id="text-after"></span>
    </div>

    <div class="choices-area">
        <button class="choice-btn" onclick="selectVowel('あ')">あ</button>
        <button class="choice-btn" onclick="selectVowel('い')">い</button>
        <button class="choice-btn" onclick="selectVowel('う')">う</button>
        <button class="choice-btn" onclick="selectVowel('え')">え</button>
        <button class="choice-btn" onclick="selectVowel('お')">お</button>
    </div>

    <div class="action-btns">
        <button class="listen-btn" onclick="playCurrentSound()">🔊 おとをきく</button>
        <button id="check-btn" onclick="checkAnswer()">けってい</button>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">つぎへ ➡️</button>
    </div>

    <div id="result-message"></div>
</div>

<script>
    let questions = [];      // JSONから読み込む配列
    let currentIndex = 0;    // 何問目か
    let selectedLetter = ""; // 選んだ文字
    let isCorrected = false; // 正解フラグ

    const hintVowelText = document.getElementById('hint-vowel');
    const textBeforeSpan = document.getElementById('text-before');
    const textAfterSpan = document.getElementById('text-after');
    const blankBox = document.getElementById('blank-box');
    const resultMessage = document.getElementById('result-message');
    const progressText = document.getElementById('progress');
    const checkBtn = document.getElementById('check-btn');
    const nextBtn = document.getElementById('next-btn');
    const choiceButtons = document.querySelectorAll('.choice-btn');

    // 1. 外部の choon.json ファイルを読み込む
    async function loadQuestions() {
        try {
            const response = await fetch('choon.json');
            questions = await response.json();
            initGame();
        } catch (error) {
            console.error("データの読み込みに失敗しました:", error);
            document.querySelector('.word-display').innerHTML = "<p style='color:red; font-size:16px;'>単語リスト（choon.json）がみつからないか、エラーがあります。</p>";
        }
    }

    // 2. ゲーム画面の初期化（問題をセットする）
    function initGame() {
        if (questions.length === 0) return;

        selectedLetter = "";
        isCorrected = false;
        resultMessage.textContent = "";
        
        // ボタン状態のリセット
        checkBtn.style.display = 'inline-block';
        nextBtn.style.display = 'none';
        
        blankBox.textContent = "？";
        blankBox.classList.remove('filled');

        // 選択ボタンの色とロックを解除
        choiceButtons.forEach(btn => {
            btn.classList.remove('selected');
            btn.disabled = false;
        });

        // 現在の問題データをセット
        const currentQuestion = questions[currentIndex];
        progressText.textContent = `${currentIndex + 1} / ${questions.length} もんめ`;
        hintVowelText.textContent = currentQuestion.hintVowel;
        textBeforeSpan.textContent = currentQuestion.textBefore;
        textAfterSpan.textContent = currentQuestion.textAfter;
    }

    // 3. 文字ボタンが押されたとき
    function selectVowel(letter) {
        if (isCorrected) return; // 正解した後は変更不可

        selectedLetter = letter;
        blankBox.textContent = letter;
        blankBox.classList.add('filled');

        // 押されたボタンに青色をつける
        choiceButtons.forEach(btn => {
            if (btn.textContent === letter) { 
                btn.classList.add('selected'); 
            } else { 
                btn.classList.remove('selected'); 
            }
        });
        resultMessage.textContent = "";
    }

    // 4. 音声読み上げ用の関数
    function getBestJapaneseVoice() {
        const voices = window.speechSynthesis.getVoices();
        const targetVoices = ["Google", "Microsoft", "Ichiro", "Ayumi", "Kyoko", "Otoya", "Haruka"];
        for (let target of targetVoices) {
            const found = voices.find(v => v.lang.includes("ja") && v.name.includes(target));
            if (found) return found;
        }
        return voices.find(v => v.lang.includes("ja"));
    }

    // 🔊 おとをきくボタン
    function playCurrentSound() {
        // 文字が選ばれていないときは、正解の答えを一時的にはめてお手本の音を流す
        const currentQuestion = questions[currentIndex];
        const letterToSpeak = selectedLetter ? selectedLetter : currentQuestion.correctVowel;
        const fullText = currentQuestion.textBefore + letterToSpeak + currentQuestion.textAfter;

        window.speechSynthesis.cancel(); 
        const bestVoice = getBestJapaneseVoice();

        // 頭切れ対策
        const wakeUpUttr = new SpeechSynthesisUtterance("　");
        wakeUpUttr.lang = 'ja-JP';
        wakeUpUttr.volume = 0.001; 
        if (bestVoice) wakeUpUttr.voice = bestVoice;
        window.speechSynthesis.speak(wakeUpUttr);

        const uttr = new SpeechSynthesisUtterance("、、、" + fullText);
        uttr.lang = 'ja-JP';
        uttr.rate = 0.85; 

        if (bestVoice) uttr.voice = bestVoice;
        window.speechSynthesis.speak(uttr);
    }

    // 5. けっていボタン
    function checkAnswer() {
        if (isCorrected) return;
        if (!selectedLetter) { alert("文字をえらんでから「けってい」を押してね！"); return; }
        
        const currentQuestion = questions[currentIndex];
        
        if (selectedLetter === currentQuestion.correctVowel) {
            resultMessage.style.color = '#ff4500'; 
            resultMessage.textContent = '⭕️ せいかい！';
            isCorrected = true;
            
            // 選択ボタンをロックして「つぎへ」を出す
            choiceButtons.forEach(btn => btn.disabled = true);
            checkBtn.style.display = 'none';
            nextBtn.style.display = 'inline-block';
        } else {
            resultMessage.style.color = '#1e90ff'; 
            resultMessage.textContent = '❌ ざんねん！ちがうおとだよ';
        }
    }

    // 6. つぎへボタン
    function nextQuestion() {
        currentIndex++; 
        if (currentIndex < questions.length) {
            initGame();
        } else {
            document.querySelector('.word-display').innerHTML = "";
            document.querySelector('.choices-area').style.display = 'none';
            document.querySelector('.hint-box').style.display = 'none';
            
            resultMessage.style.color = '#ff6b81';
            resultMessage.textContent = '🎉 ぜんぶクリア！おめでとう！';
            progressText.textContent = 'ゲーム終了';
            checkBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        }
    }

    window.speechSynthesis.onvoiceschanged = () => {};
    loadQuestions();
</script>
</body>
</html>
