<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちいさい「っ」のならべかえクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        .question-text { font-size: 18px; color: #666; margin-bottom: 20px; }
        #sortable-area { display: flex; justify-content: center; gap: 15px; margin: 30px 0; min-height: 80px; }
        .char-card { width: 60px; height: 60px; background-color: #ffe4e1; border: 3px solid #ffb6c1; border-radius: 15px; font-size: 28px; font-weight: bold; color: #d11a2a; display: flex; align-items: center; justify-content: center; cursor: grab; user-select: none; }
        .char-card.sokuon { background-color: #e0ffff; border-color: #00ced1; color: #008b8b; }
        .sortable-ghost { opacity: 0.4; }
        button { background-color: #4caf50; color: white; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 5px; }
        button.listen-btn { background-color: #008cba; }
        .back-btn { background-color: #888; font-size: 14px; padding: 8px 20px; border-radius: 15px; text-decoration: none; color: white; display: inline-block; margin-bottom: 20px; }
        #result-message { font-size: 32px; font-weight: bold; margin-top: 20px; height: 45px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← メニューにもどる</a>
    <h1>ちいさい「っ」は どこに入る？</h1>
    <p class="question-text">カードをながおしして、ただしい ばしょに うごかそう！</p>

    <div id="sortable-area"></div>

    <div>
        <button class="listen-btn" onclick="playCurrentSound()">🔊 おとをきく</button>
        <button onclick="checkAnswer()">まるつけ</button>
    </div>

    <div id="result-message"></div>
</div>

<script>
    const currentQuestion = { correct: "コロッケ", display: ["コ", "ロ", "ケ", "ッ"] };
    const sortableArea = document.getElementById('sortable-area');
    const resultMessage = document.getElementById('result-message');

    function initGame() {
        sortableArea.innerHTML = '';
        resultMessage.textContent = '';
        currentQuestion.display.forEach(char => {
            const card = document.createElement('div');
            card.textContent = char;
            card.classList.add('char-card');
            if (char === 'っ' || char === 'ッ') { card.classList.add('sokuon'); }
            sortableArea.appendChild(card);
        });
        new Sortable(sortableArea, { animation: 200, ghostClass: 'sortable-ghost' });
    }

    function getCurrentText() {
        const cards = sortableArea.querySelectorAll('.char-card');
        let text = '';
        cards.forEach(card => { text += card.textContent; });
        return text;
    }

    // 聞き取りやすい日本語の声を自動で選ぶ関数
    function getBestJapaneseVoice() {
        const voices = window.speechSynthesis.getVoices();
        // Googleの日本語、Microsoftの日本語、AppleのKyokoなど、きれいに聞こえる声を優先的に探す
        const targetVoices = ["Google", "Microsoft", "Ichiro", "Ayumi", "Kyoko", "Otoya", "Haruka"];
        for (let target of targetVoices) {
            const found = voices.find(v => v.lang.includes("ja") && v.name.includes(target));
            if (found) return found;
        }
        return voices.find(v => v.lang.includes("ja")); // 見つからなければ普通の日本語
    }

    function playCurrentSound() {
        const text = getCurrentText();
        
        // 【頭切れ防止】スピーカーが立ち上がる時間を稼ぐため、読点「、」を頭につける
        const uttr = new SpeechSynthesisUtterance("、" + text);
        
        uttr.lang = 'ja-JP';
        uttr.rate = 0.9; // 【速度変更】0.9倍速に設定

        const bestVoice = getBestJapaneseVoice();
        if (bestVoice) uttr.voice = bestVoice; // 【声の変更】高品質な声を設定

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(uttr);
    }

    function checkAnswer() {
        if (getCurrentText() === currentQuestion.correct) {
            resultMessage.style.color = '#ff4500';
            resultMessage.textContent = '⭕️ せいかい！';
        } else {
            resultMessage.style.color = '#1e90ff';
            resultMessage.textContent = '❌ ざんねん！もういちど';
        }
    }

    // 音声リストが読み込まれるのを待つための処理（ブラウザ対策）
    window.speechSynthesis.onvoiceschanged = () => {};

    initGame();
</script>
</body>
</html>
