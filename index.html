<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちいさい「っ」と のばすおとの れんしゅう</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #e6f7ff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .menu-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h1 {
            color: #333;
            font-size: 26px;
            line-height: 1.5;
            margin-bottom: 40px;
        }
        .menu-btn {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        /* 促音ボタン（ピンク系） */
        .btn-sokuon {
            background-color: #ff6b81;
            box-shadow: 0 6px 0 #ee5253;
        }
        /* 長音ボタン（オレンジ系） */
        .btn-choon {
            background-color: #ff9f43;
            box-shadow: 0 6px 0 #ee5253;
            box-shadow: 0 6px 0 #f39c12;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>ちいさい「っ」と<br>のばすおとの れんしゅう</h1>
    
    <a href="sokuon.html" class="menu-btn btn-sokuon">ちいさい「っ」</a>
    <a href="choon.html" class="menu-btn btn-choon">のばすおと</a>
</div>

</body>
</html>
